name: Publish MCP Server

# Tag-triggered (mcp-v0.1.0 -> 0.1.0). Publishes @superserve/mcp to npm (Trusted
# Publishing + provenance), then registers server.json in the MCP Registry.
# Prereqs: npm Trusted Publisher configured for @superserve/mcp; @superserve/sdk
# >= 0.7.7 published; mcp.superserve.ai live; public repo (OIDC + provenance).

on:
  push:
    tags: ["mcp-v*"]

jobs:
  publish:
    name: Publish @superserve/mcp + MCP Registry
    runs-on: ubuntu-latest
    permissions:
      id-token: write # OIDC: npm Trusted Publishing + provenance + mcp-publisher
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "lts/*"
          registry-url: "https://registry.npmjs.org"

      - name: Install
        run: bun install --frozen-lockfile

      - name: Set version from tag
        working-directory: packages/mcp
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/mcp-v}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp && mv package.json.tmp package.json
          jq --arg v "$VERSION" '.version = $v | (.packages[] | select(.registryType=="npm") | .version) = $v' server.json > server.json.tmp && mv server.json.tmp server.json

      # Pin @superserve/sdk (workspace:* would break `npm i`) to the published
      # version, failing if it's below the floor the server needs (downloadDir).
      - name: Pin workspace runtime deps to published versions
        working-directory: packages/mcp
        run: |
          set -euo pipefail
          MIN_SDK_VERSION="0.7.7"
          SDK_VERSION="$(npm view @superserve/sdk version)"
          test -n "$SDK_VERSION"
          if [ "$(printf '%s\n%s\n' "$MIN_SDK_VERSION" "$SDK_VERSION" | sort -V | head -n1)" != "$MIN_SDK_VERSION" ]; then
            echo "::error::Published @superserve/sdk $SDK_VERSION < required $MIN_SDK_VERSION. Publish the SDK first, then re-tag." >&2
            exit 1
          fi
          jq --arg v "^$SDK_VERSION" '.dependencies["@superserve/sdk"] = $v' package.json > package.json.tmp && mv package.json.tmp package.json

      - name: Build
        run: bunx turbo run build --filter=@superserve/mcp

      # Trusted Publishing needs npm >= 11.5.1 (newer than setup-node's bundled npm).
      - name: Upgrade npm
        run: npm install -g npm@latest

      - name: Publish to npm (Trusted Publishing + provenance)
        working-directory: packages/mcp
        run: npm publish --access public --provenance

      - name: Install mcp-publisher
        run: |
          set -euo pipefail
          OS="$(uname -s | tr '[:upper:]' '[:lower:]')"
          ARCH="$(uname -m | sed 's/x86_64/amd64/;s/aarch64/arm64/')"
          curl -fL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_${OS}_${ARCH}.tar.gz" | tar xz mcp-publisher

      - name: Validate server.json
        working-directory: packages/mcp
        run: ${{ github.workspace }}/mcp-publisher validate

      - name: Login to MCP Registry (GitHub OIDC)
        working-directory: packages/mcp
        run: ${{ github.workspace }}/mcp-publisher login github-oidc

      - name: Publish to MCP Registry
        working-directory: packages/mcp
        run: ${{ github.workspace }}/mcp-publisher publish
