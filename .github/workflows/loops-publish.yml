name: Publish Loops

# Tag-triggered. Use tags like `loops-v0.1.0` so this does NOT collide with the
# CLI/SDK release flows that listen on `v*` (cli-publish.yml, release.yml) — same
# convention as mcp-publish.yml (`mcp-v*`).
#
# PREREQUISITES:
#   - @superserve/sdk on npm: the loop runtime is vendored as raw .ts that imports
#     @superserve/sdk at runtime, and this package depends on it. The "Pin workspace
#     runtime deps" step rewrites `workspace:*` to the SDK version currently in the
#     repo, which MUST already be published on npm (>= the version the loop needs).
#     Publish @superserve/sdk first if it is behind, then re-tag.
#   - NPM access: NPM_TOKEN must be able to create a NEW package under the @superserve
#     org. A granular token scoped only to existing packages (@superserve/sdk,
#     @superserve/cli) CANNOT create @superserve/loops — in that case an org owner must
#     run the FIRST `npm publish` manually once, after which this workflow handles
#     every later version.

on:
  push:
    tags: ["loops-v*"]

jobs:
  publish-npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Set version from tag
        working-directory: examples/loops
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF#refs/tags/loops-v}"
          jq --arg v "$VERSION" '.version = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Pin workspace runtime deps to published versions
        working-directory: examples/loops
        run: |
          set -euo pipefail
          # npm publish does NOT translate `workspace:*` in this bun-managed repo, so a
          # literal "@superserve/sdk": "workspace:*" would ship and break installs of
          # @superserve/loops. Rewrite it to the SDK's concrete version (which must
          # already be on npm). The matching @superserve/sdk release must exist first.
          SDK_VERSION="$(jq -r .version ../../packages/sdk/package.json)"
          jq --arg v "^$SDK_VERSION" '.dependencies["@superserve/sdk"] = $v' package.json > package.json.tmp
          mv package.json.tmp package.json

      - name: Publish
        working-directory: examples/loops
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          set -euo pipefail
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > .npmrc
          npm publish --access=public
          rm .npmrc
