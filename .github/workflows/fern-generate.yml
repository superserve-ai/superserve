name: Fern — Regenerate SDKs

on:
  workflow_dispatch:

jobs:
  regenerate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Regenerate SDKs from remote spec
        run: bun run generate

      - name: Detect changes
        id: diff
        run: |
          if [ -z "$(git status --porcelain packages/sdk/src packages/python-sdk/src/superserve)" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(sdk): regenerate from openapi.yaml"
          title: "chore(sdk): regenerate from openapi.yaml"
          body: |
            Regenerated TypeScript and Python SDKs from the remote OpenAPI spec.

            Triggered manually from the Actions UI.
          branch: chore/fern-regenerate
          delete-branch: true
