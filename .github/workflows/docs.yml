name: Publish Fern Docs

on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5

      - name: Install
        run: bun install --frozen-lockfile

      - name: Publish docs
        run: bun run docs:publish
        env:
          FERN_TOKEN: ${{ secrets.FERN_TOKEN }}
