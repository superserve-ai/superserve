# Fern overlay — adds the data-plane file endpoints to the Superserve API spec.
#
# The backend repo's openapi.yaml documents only the control plane (lifecycle,
# exec, system). File upload/download run on a separate data plane reached via
# per-sandbox edge proxies at `boxd-{sandbox_id}.sandbox.superserve.ai`, with
# a different auth header (`X-Access-Token` from `SandboxResponse.access_token`).
#
# This overlay adds those endpoints so Fern can generate matching SDK methods
# and API Reference docs pages alongside the rest. It is merged in via the
# `overrides:` field in `fern/generators.yml`.
#
# IMPLEMENTATION NOTES:
#
# 1. `x-fern-server-name` is required on BOTH the top-level servers AND the
#    per-endpoint server override. Without names on both sides, Fern silently
#    ignores the per-endpoint `servers:` block.
#
# 2. `X-Access-Token` is declared as a plain header parameter, NOT as a global
#    security scheme in `components.securitySchemes`. If it were a security
#    scheme, Fern's Python generator would add `access_token` as a required
#    constructor argument on the top-level `Superserve` class — but the token
#    is per-sandbox, not per-client, so that model doesn't fit. Declaring it
#    as a header param keeps it per-call.
#
# 3. `{sandbox_id}` in the server URL is templated at build time, not per-call.
#    Fern's server variables are designed for static config (region, tenant)
#    rather than per-request values. To reach the right sandbox, users pass
#    a `baseUrl` override in request options — see the spec doc and quickstarts.
#
# When the backend adds files to the primary openapi.yaml (eventually), this
# overlay and its generators.yml reference can be deleted.

# Name the existing control-plane servers so Fern can distinguish them from
# the per-operation data-plane server below.
servers:
  - url: https://api-staging.superserve.ai
    x-fern-server-name: Staging
  - url: https://api.superserve.ai
    x-fern-server-name: Production
  - url: http://localhost:8080
    x-fern-server-name: Local

paths:
  /files:
    servers:
      - url: "https://boxd-{sandbox_id}.sandbox.superserve.ai"
        x-fern-server-name: SandboxDataPlane
        x-fern-default-url: "https://boxd.sandbox.superserve.ai"
        description: Per-sandbox edge proxy (data plane)
        variables:
          sandbox_id:
            default: ""
            description: >-
              Target sandbox ID. Fern templates this at build time — callers
              override the base URL per request.

    post:
      operationId: uploadFile
      tags: [Files]
      summary: Upload a file into a sandbox
      description: |
        Uploads raw file bytes to an absolute path inside the sandbox. The
        body is sent as `application/octet-stream` — the entire request body
        is the file contents.

        Authentication uses the per-sandbox access token from
        `SandboxResponse.access_token`, passed in the `X-Access-Token` header.
        This is distinct from the control-plane `X-API-Key`.
      parameters:
        - name: X-Access-Token
          in: header
          required: true
          description: |
            Per-sandbox HMAC access token. Take this from
            `SandboxResponse.access_token` on the sandbox you're uploading to.
          schema:
            type: string
        - name: path
          in: query
          required: true
          description: |
            Absolute destination path inside the sandbox. Must start with `/`
            and must not contain `..` segments.
          schema:
            type: string
            example: /home/user/data.txt
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          description: File uploaded
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    get:
      operationId: downloadFile
      tags: [Files]
      summary: Download a file from a sandbox
      description: |
        Streams the file at `path` from the sandbox as `application/octet-stream`.
        Uses the same per-sandbox access token as upload.
      parameters:
        - name: X-Access-Token
          in: header
          required: true
          description: |
            Per-sandbox HMAC access token. Take this from
            `SandboxResponse.access_token` on the sandbox you're reading from.
          schema:
            type: string
        - name: path
          in: query
          required: true
          description: |
            Absolute file path inside the sandbox. Must start with `/` and
            must not contain `..` segments.
          schema:
            type: string
            example: /home/user/data.txt
      responses:
        "200":
          description: File contents
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
