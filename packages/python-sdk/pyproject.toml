[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "superserve"
version = "0.6.0"
description = "Python SDK for the Superserve sandbox API"
license = "Apache-2.0"
readme = "README.md"
requires-python = ">=3.9"
keywords = ["superserve", "sandbox", "firecracker", "microvm", "sdk"]
classifiers = [
    "Development Status :: 4 - Beta",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries :: Python Modules",
]
dependencies = [
    "httpx>=0.24.0",
    "pydantic>=2.0.0",
    "typing-extensions>=4.0.0",
]

[project.urls]
Homepage = "https://superserve.ai"
Repository = "https://github.com/superserve-ai/superserve"
Issues = "https://github.com/superserve-ai/superserve/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/superserve"]
