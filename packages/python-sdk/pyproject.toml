[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "superserve"
version = "0.4.0"
description = "Python SDK for Superserve cloud micro-VMs"
license = { file = "../../LICENSE" }
readme = "../../README.md"
requires-python = ">=3.10"
keywords = ["vm", "sandbox", "sdk", "superserve", "cloud"]
dependencies = ["httpx>=0.27"]

[project.urls]
Homepage = "https://superserve.ai"
Repository = "https://github.com/superserve-ai/superserve"

[tool.hatch.build.targets.wheel]
packages = ["src/superserve"]
