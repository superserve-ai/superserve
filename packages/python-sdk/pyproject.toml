[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "superserve"
version = "0.3.0"
description = "Python SDK for building agents on Superserve"
license = { file = "../../LICENSE" }
readme = "../../README.md"
requires-python = ">=3.12"
keywords = ["agents", "ai", "llm", "sdk", "superserve"]
dependencies = []

[project.urls]
Homepage = "https://superserve.ai"
Repository = "https://github.com/superserve-ai/superserve"

[tool.hatch.build.targets.wheel]
packages = ["src/superserve"]
